name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh shellcheck neovim

      - name: zsh syntax check
        run: zsh -n dot_zshrc

      - name: shellcheck dot_zshrc
        run: shellcheck -x dot_zshrc

      - name: Validate Neovim configuration
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          ci_home="$WORKSPACE/.ci-home"
          rm -rf "$ci_home"
          mkdir -p "$ci_home/.config/nvim" "$ci_home/.config/vim"
          cp dot_vimrc "$ci_home/.vimrc"
          cp dot_config/nvim/init.vim "$ci_home/.config/nvim/init.vim"
          cp dot_config/vim/*.vim "$ci_home/.config/vim/"
          HOME="$ci_home" XDG_CONFIG_HOME="$ci_home/.config" nvim --headless "+quit"

  fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y git curl zsh chezmoi

      - name: Apply chezmoi to test home
        env:
          HOME: /tmp/chezmoi-home
          WORKSPACE: ${{ github.workspace }}
        run: |
          rm -rf "$HOME"
          mkdir -p "$HOME"
          chezmoi apply --source "$WORKSPACE" --destination "$HOME" --force

      - name: Verify rendered files
        env:
          HOME: /tmp/chezmoi-home
        run: |
          test -f "$HOME/.zshrc"
          test -f "$HOME/.config/nvim/init.vim"
          test -f "$HOME/.config/vim/plugins.vim"
          zsh -n "$HOME/.zshrc"

  ci:
    runs-on: ubuntu-latest
    needs:
      - lint
      - fedora
    steps:
      - name: All checks passed
        run: echo "ci aggregation job"
